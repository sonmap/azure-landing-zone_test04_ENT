name: Terraform and Ansible deploy

on:
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Terraform live directory"
        required: true
        default: "live/30-services/webwas-sales-dev"
      run_ansible:
        description: "Run Ansible after Terraform apply"
        required: true
        default: "false"

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Terraform init and plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init
          terraform plan -out=tfplan

  apply:
    needs: plan
    runs-on: self-hosted
    environment: terraform-apply-approval
    steps:
      - uses: actions/checkout@v4
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Terraform apply
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform init
          terraform apply -auto-approve
      - name: Generate Ansible inventory
        if: ${{ inputs.run_ansible == 'true' }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform output -json > tf_output.json
          python ../../../tools/tf_output_to_ansible_inventory.py --input tf_output.json --out ../../../ansible/inventories/generated/runtime.ini
      - name: Run Ansible
        if: ${{ inputs.run_ansible == 'true' }}
        working-directory: ansible
        run: |
          ansible-playbook -i inventories/generated/runtime.ini playbooks/linux_base.yml
          ansible-playbook -i inventories/generated/runtime.ini playbooks/tomcat_install.yml
